<div class="game-table" #tableEl>
  <div class="game-table__surface" [ngStyle]="surfaceStyle()">
    <!-- Anillo decorativo interior ovalado -->
    <div class="game-table__ring" aria-hidden="true"></div>

    <!-- Arte geometrico holografico sutil -->
    <div class="game-table__geo" aria-hidden="true">
      <svg viewBox="0 0 200 200" class="game-table__geo-svg">
        <polygon points="100,10 178,55 178,145 100,190 22,145 22,55" class="game-table__geo-hex" />
        <polygon points="100,40 148,70 148,130 100,160 52,130 52,70" class="game-table__geo-hex game-table__geo-hex--inner" />
        <line x1="100" y1="10" x2="100" y2="40" class="game-table__geo-line" />
        <line x1="178" y1="55" x2="148" y2="70" class="game-table__geo-line" />
        <line x1="178" y1="145" x2="148" y2="130" class="game-table__geo-line" />
        <line x1="100" y1="190" x2="100" y2="160" class="game-table__geo-line" />
        <line x1="22" y1="145" x2="52" y2="130" class="game-table__geo-line" />
        <line x1="22" y1="55" x2="52" y2="70" class="game-table__geo-line" />
        <polygon points="100,70 130,100 100,130 70,100" class="game-table__geo-diamond" />
      </svg>
    </div>

    <!-- Cuatro jugadores con grid 2x2 de cartas -->
    @for (pos of positions; track pos) {
      <div class="game-table__hand"
           [class]="'game-table__hand game-table__hand--' + pos"
           [class.game-table__hand--active]="isActive(pos)">
        @for (i of cardIndices; track i) {
          <div class="game-table__card"
               [class.game-table__card--skin]="!!reversoUrl"
               [class.game-table__card--swapping]="handSwapIndex(pos) === i"
               [ngStyle]="cardStyle()">
          </div>
        }
      </div>
    }

    <!-- Pilas centrales -->
    <div class="game-table__center">
      <!-- Pila de robar -->
      <div class="game-table__pile game-table__pile--draw"
           [class.game-table__pile--active]="phase() === 'drawing'">
        <div class="game-table__pile-depth"></div>
        <div class="game-table__pile-depth"></div>
        <div class="game-table__pile-depth"></div>
        <div class="game-table__pile-depth"></div>
        <div class="game-table__pile-depth"></div>
        <div class="game-table__card game-table__card--pile"></div>

        <!-- Carta robada flotante -->
        <div [class]="drawnClasses()">
          <div class="game-table__card game-table__card--drawn">
            <div class="game-table__card-face game-table__card-face--front">
              <span [class]="'game-table__card-suit game-table__card-suit--' + drawnColorKey()">
                {{ drawnCard()?.suit ?? '' }}
              </span>
              <span [class]="'game-table__card-value game-table__card-value--' + drawnColorKey()">
                {{ drawnCard()?.value ?? '' }}
              </span>
            </div>
            <div class="game-table__card-face game-table__card-face--back"></div>
          </div>
        </div>
      </div>

      <!-- Pila de descartes -->
      <div class="game-table__pile game-table__pile--discard">
        <div class="game-table__card game-table__card--fan"></div>
        <div class="game-table__card game-table__card--fan"></div>
        <div class="game-table__card game-table__card--fan"></div>
        <div class="game-table__card game-table__card--face-up">
          <span [class]="'game-table__card-suit game-table__card-suit--' + discardColorKey()">
            {{ discardCard().suit }}
          </span>
          <span [class]="'game-table__card-value game-table__card-value--' + discardColorKey()">
            {{ discardCard().value }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
