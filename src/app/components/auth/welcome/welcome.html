<div class="welcome-page">
  <app-settings-fab></app-settings-fab>


  <!-- Glow orb behind logo -->
  <div class="welcome-orb" aria-hidden="true"></div>

  <!-- Logo dramatic reveal -->
  <div class="welcome-logo">
    <img class="logo-img logo-img--hero" src="logo.png" alt="Cubo" />
  </div>

  <!-- Tagline -->
  <p class="welcome-tagline">El juego de cartas definitivo</p>

  <!-- Action buttons -->
  <div class="welcome-actions">
    <a class="btn-neon welcome-btn" routerLink="/login">
      Iniciar Sesión
    </a>
    <a class="btn-ghost welcome-btn" routerLink="/register">
      Crear Cuenta
    </a>
  </div>

  <!-- Bottom decoration -->
  <div class="welcome-footer">
    <div class="welcome-footer__suits">
      <span>♠</span>
      <span>♥</span>
      <span>♦</span>
      <span>♣</span>
    </div>
  </div>

  <!-- Sparkles -->
  <div class="sparkle-deco" style="bottom:18%; right:12%"></div>
  <div class="sparkle-deco" style="top:15%;   left:8%" ></div>

</div>
