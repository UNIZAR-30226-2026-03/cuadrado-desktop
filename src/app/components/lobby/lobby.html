<div class="lobby">

  <!-- ═══ Top bar compartida ═══ -->
  <div class="lobby-top-bar-wrap" @headerSlide>
    <app-top-bar (settings)="openConfigPopup()"></app-top-bar>
  </div>

  <!-- ═══ Cubos 3D efímeros ═══ -->
  @for (cube of cubes(); track cube.id) {
    <div class="spawning-cube"
         [style.left.%]="cube.x"
         [style.top.%]="cube.y"
         [style.--cube-duration]="cube.duration + 'ms'">
      <div class="spawning-cube__body" [style.width.px]="cube.size" [style.height.px]="cube.size">
        @for (face of cube.faces; track $index) {
          <div class="spawning-cube__face"
               [style.width.px]="cube.size"
               [style.height.px]="cube.size"
               [style.transform]="face"></div>
        }
      </div>
    </div>
  }

  <!--Animación de entrada del lobby -->
  <main class="lobby-main">
    <app-game-table [reversoUrl]="reversoUrl()"></app-game-table>
  </main>

  <!-- ═══ Bottom navigation ═══ -->
  <nav class="lobby-nav-bottom" @navStagger>
    <div class="nav-track">
      <button class="nav-btn" (click)="openDeckPopup()">
        <span class="nav-btn__icon">▶</span>
        <span class="nav-btn__label">Crear
Partida</span>
      </button>
      <button class="nav-btn" (click)="navegar('/shop')">
        <span class="nav-btn__icon">🛒</span>
        <span class="nav-btn__label">Tienda</span>
      </button>
      <button class="nav-btn" (click)="navegar('/inventory')">
        <span class="nav-btn__icon">🧰</span>
        <span class="nav-btn__label">Inventario</span>
      </button>
      <button class="nav-btn" (click)="navegar('/rooms')">
        <span class="nav-btn__icon">🔍</span>
        <span class="nav-btn__label">Unirse a sala</span>
      </button>
      <button class="nav-btn" (click)="irPerfil()">
        <span class="nav-btn__icon">👤</span>
        <span class="nav-btn__label">Perfil</span>
      </button>
    </div>
  </nav>

  @if (showDeckPopup) {
    <div class="deck-popup-overlay" (click)="closeDeckPopup()">
      <div class="deck-popup glass-card" (click)="$event.stopPropagation()">
        <h3 class="deck-popup__title">Selecciona el número de barajas</h3>
        <div class="deck-popup__options">
          <button class="btn-neon deck-popup__btn" (click)="selectDecks(1)">1 BARAJA</button>
          <button class="btn-neon deck-popup__btn" (click)="selectDecks(2)">2 BARAJAS</button>
          <button class="btn-ghost deck-popup__btn deck-popup__btn--disabled" disabled>REANUDAR ÚLTIMA PARTIDA</button>
        </div>
        <button class="btn-ghost deck-popup__cancel" (click)="closeDeckPopup()">Cancelar</button>
      </div>
    </div>
  }

  @if (showConfigPopup) {
    <app-settings-popup (closed)="closeConfigPopup()"></app-settings-popup>
  }

</div>
